<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Intelligence Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #007bff; color: white; margin-bottom: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border: none; border-radius: 8px; }
        .table thead { background-color: #e9ecef; }
        .badge-passed { background-color: #28a745; }
        .badge-failed { background-color: #dc3545; }
    </style>
</head>
<body>

<nav class="navbar p-3">
    <div class="container">
        <span class="navbar-brand mb-0 h1"><i class="fas fa-user-graduate me-2"></i> Student Portal</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4">
                <h4 class="mb-3 text-primary">Register Student</h4>
                <form action="/add_student" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Section</label>
                        <input type="text" name="section" class="form-control" placeholder="e.g. Zechariah" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Grade</label>
                        <input type="number" name="grade" class="form-control" placeholder="0-100" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add to Records</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <h4 class="mb-3 text-primary">Student Records</h4>
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Section</th>
                            <th>Grade</th>
                            <th>Letter</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr>
                            <td>{{ student.id }}</td>
                            <td><strong>{{ student.name }}</strong></td>
                            <td>{{ student.section }}</td>
                            <td>{{ student.grade }}%</td>
                            <td><span class="badge bg-info text-dark">{{ student.letter }}</span></td>
                            <td>
                                <span class="badge {{ 'badge-passed' if student.remark == 'Passed' or student.remark != 'Failed' else 'badge-failed' }}">
                                    {{ student.remark }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
